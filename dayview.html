<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day View — Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--accent:#6c63ff;--accent2:#ff6584;--green:#00c9a7;--amber:#ffb347;--purple:#7c3aed;--card-r:14px;}
[data-theme="dark"]{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e8eaf0;--muted:#6b7280;--row-hover:rgba(108,99,255,.06);--input-bg:#1a1d27;--th-bg:#13151f;--foot-bg:#13151f;--pill-bg:rgba(108,99,255,.15);--pill-txt:#a89fff;--panel-bg:#13151f;--overlay:rgba(0,0,0,.55);}
[data-theme="light"]{--bg:#f3f4f8;--surface:#ffffff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--row-hover:#f5f8ff;--input-bg:#f9fafb;--th-bg:#f9fafb;--foot-bg:#f9fafb;--pill-bg:#eff6ff;--pill-txt:#1d4ed8;--panel-bg:#ffffff;--overlay:rgba(0,0,0,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;transition:background .25s,color .25s;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header-left{display:flex;align-items:center;gap:16px;}
.btn-back{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;text-decoration:none;}
.btn-back:hover{border-color:var(--accent);color:var(--text);}
.header-title h1{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;background:linear-gradient(90deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-title p{color:var(--muted);font-size:13px;margin-top:3px;}
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;}
.toggle input{display:none;}
.track{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:background .25s;}
.toggle input:checked~.track{background:var(--accent);}
.thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:left .2s;}
.toggle input:checked~.thumb{left:23px;}
.date-section{padding:32px 36px 0;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.date-section label{font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
input[type="date"]{height:44px;padding:0 16px;background:var(--surface);border:2px solid var(--accent);color:var(--text);border-radius:10px;font-size:16px;font-family:'Inter',sans-serif;outline:none;cursor:pointer;transition:background .25s;}
[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;}
.selected-date-label{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);}
.no-date-hint{font-size:14px;color:var(--muted);padding:60px 36px;text-align:center;}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;padding:24px 36px 0;}
.s-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--card-r);
    padding:18px 20px;
    position:relative;
    overflow:hidden;
    transition:
        background .25s,
        border-color .25s,
        transform .18s ease,
        box-shadow .18s ease;
}
.s-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--accent));}
.s-card:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 28px rgba(0,0,0,.18);
}

.s-card:hover::before{
    height:4px;
}
.s-card .sc-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.s-card .sc-val{font-size:28px;font-weight:700;margin-top:8px;color:var(--c,var(--accent));font-family:'Space Grotesk',sans-serif;}
.s-card .sc-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.section-divider{margin:28px 36px 0;border:none;border-top:1px solid var(--border);}
.tabs-section{padding:24px 36px 0;}
.tabs-section h2{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;}
.tabs{display:flex;gap:0;}
.tab{padding:10px 24px;font-size:14px;font-weight:500;border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s;}
.tab:first-child{border-radius:8px 0 0 8px;}
.tab:last-child{border-radius:0 8px 8px 0;}
.tab:not(:first-child){border-left:none;}
.tab.active-all{background:#6c63ff;color:#fff;border-color:#6c63ff;}
.tab.active-face{background:#6c63ff;color:#fff;border-color:#6c63ff;}
.tab.active-fingerprint{background:#00c9a7;color:#fff;border-color:#00c9a7;}
.tab.active-greathr{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.tab:not([class*="active"]):hover{color:var(--text);}
.day-controls{padding:14px 36px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.day-controls input[type="text"]{height:36px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:0 12px;border-radius:8px;font-size:13px;outline:none;font-family:'Inter',sans-serif;width:240px;}
.day-controls input[type="text"]:focus{border-color:var(--accent);}
.day-controls input::placeholder{color:var(--muted);}
.day-count{margin-left:auto;font-size:13px;color:var(--muted);}
.table-wrap{margin:14px 36px 40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--card-r);overflow:hidden;transition:background .25s,border-color .25s;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--th-bg);border-bottom:2px solid var(--border);}
thead th{padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
thead th:first-child{width:52px;text-align:center;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--row-hover);}
.emp,
.pnch-mode,
.pnch-total,
.pnch-sep,
.badge{
    transition:color .18s ease, transform .18s ease;
}

tbody tr:hover .emp,
tbody tr:hover .pnch-mode,
tbody tr:hover .pnch-total,
tbody tr:hover .pnch-sep{
    color:var(--accent);
}

tbody tr:hover .badge{
    transform:translateY(-1px);
}
tbody td{padding:13px 16px;font-size:15px;vertical-align:middle;}
tbody td:first-child{text-align:center;color:var(--muted);font-size:13px;}
.emp{font-weight:600;}
.emp-id-col{font-size:13px;color:var(--muted);font-family:'Space Grotesk',sans-serif;}
.t-in{color:var(--green);font-weight:600;}
.t-out{color:var(--accent2);font-weight:600;}
/* punch count */
.pnch{font-size:13px;text-align:center;}
.pnch-mode{font-weight:600;color:var(--text);}
.pnch-sep{color:var(--muted);margin:0 2px;}
.pnch-total{color:var(--muted);}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.badge-full{background:rgba(0,201,167,.12);color:var(--green);}.badge-full::before{background:var(--green);}
.badge-half{background:rgba(255,179,71,.12);color:var(--amber);}.badge-half::before{background:var(--amber);}
.badge-short{background:rgba(255,101,132,.12);color:var(--accent2);}.badge-short::before{background:var(--accent2);}
.tfoot-row{padding:10px 16px;background:var(--foot-bg);border-top:1px solid var(--border);font-size:13px;color:var(--muted);transition:background .25s;}
.no-data{text-align:center;padding:48px;color:var(--muted);}

/* ── Panel ── */
.overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:100;}
.overlay.open{display:block;}
.panel{position:fixed;top:0;right:-580px;width:560px;height:100vh;background:var(--panel-bg);border-left:1px solid var(--border);z-index:101;overflow-y:auto;transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.panel.open{right:0;}
.panel-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--panel-bg);z-index:1;}
.panel-header h2{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;}
.ph-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.btn-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;flex-shrink:0;margin-left:12px;}
.btn-close:hover{color:var(--text);border-color:var(--muted);}
.panel-body{padding:20px 24px;flex:1;}
.panel-emp-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
.panel-emp-name{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;}
.panel-emp-id{font-size:13px;color:var(--muted);margin-top:3px;}
.panel-mode-pills{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.mode-pill{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;}
.mode-face{background:rgba(108,99,255,.15);color:#a89fff;}
.mode-fp{background:rgba(0,201,167,.15);color:var(--green);}
.mode-ghr{background:rgba(124,58,237,.15);color:#c084fc;}
.panel-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.panel-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;}
.ps-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.ps-val{font-size:20px;font-weight:700;margin-top:5px;}
.panel-section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.panel-day-label{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.panel-table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.panel-table{width:100%;border-collapse:collapse;font-size:13px;}
.panel-table thead tr{background:var(--th-bg);border-bottom:1px solid var(--border);}
.panel-table thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.panel-table tbody tr{border-bottom:1px solid var(--border);}
.panel-table tbody tr:last-child{border-bottom:none;}
.panel-table tbody tr:hover{background:var(--row-hover);}
.panel-table tbody td{padding:10px 12px;}
.panel-foot{padding:8px 12px;background:var(--foot-bg);border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.punch-in{color:var(--green);font-weight:600;}
.punch-out{color:var(--accent2);font-weight:600;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="btn-back" href="index.html">← Back</a>
    <div class="header-title">
      <h1>View by Date</h1>
      <p>Select a date to view attendance records</p>
    </div>
  </div>
  <div class="toggle-wrap">
    <span>☀️</span>
    <label class="toggle">
      <input type="checkbox" id="themeToggle" checked onchange="toggleTheme()">
      <div class="track"></div><div class="thumb"></div>
    </label>
    <span>🌙</span>
  </div>
</div>

<div class="date-section">
  <label>Select Date</label>
  <input type="date" id="dayPicker" onchange="loadDay()">
  <span class="selected-date-label" id="selectedLabel"></span>
</div>

<div id="content">
  <div class="no-date-hint">👆 Pick a date above to view attendance details for that day</div>
</div>

<!-- Overlay + Panel -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div>
      <h2 id="panel-name">—</h2>
      <div class="ph-sub" id="panel-id">—</div>
    </div>
    <button class="btn-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body">

    <div class="panel-emp-header">
      <div class="panel-emp-name" id="pe-name">—</div>
      <div class="panel-emp-id"   id="pe-id">—</div>
      <div class="panel-mode-pills" id="pe-modes"></div>
    </div>

    <div class="panel-stat-row">
      <div class="panel-stat">
        <div class="ps-label">First In</div>
        <div class="ps-val" id="ps-firstin" style="color:var(--green);font-size:16px">—</div>
      </div>
      <div class="panel-stat">
        <div class="ps-label">Last Out</div>
        <div class="ps-val" id="ps-lastout" style="color:var(--accent2);font-size:16px">—</div>
      </div>
      <div class="panel-stat">
        <div class="ps-label">Total Punches</div>
        <div class="ps-val" id="ps-punches" style="color:var(--accent)">—</div>
      </div>
    </div>

    <div class="panel-day-label" id="panel-day-label">📅 —</div>

    <div id="pv-punches">
      <div class="panel-section-title">Punch Events for This Day</div>
      <div class="panel-table-wrap">
        <table class="panel-table">
          <thead>
            <tr><th>#</th><th>Time</th><th>Punch</th><th>Mode</th><th>Device</th></tr>
          </thead>
          <tbody id="punch-tbody"></tbody>
        </table>
        <div class="panel-foot" id="punch-foot">—</div>
      </div>
    </div>

  </div>
</div>

<script>
let faceData=[], fpData=[], ghrData=[], punchData=[];
let currentTab="face";
let panelContext=null;

function toggleTheme(){const t=document.getElementById("themeToggle").checked?"dark":"light";document.documentElement.setAttribute("data-theme",t);localStorage.setItem("attendance-theme",t);}
const st=localStorage.getItem("attendance-theme");
if(st){document.documentElement.setAttribute("data-theme",st);document.getElementById("themeToggle").checked=st==="dark";}

Promise.all([
  fetch("face_summary.json").then(r=>r.json()),
  fetch("fingerprint_summary.json").then(r=>r.json()),
  fetch("greathr_summary.json").then(r=>r.json()),
  fetch("punch_details.json").then(r=>r.json()),
]).then(([f,fp,g,pd])=>{
  faceData=f; fpData=fp; ghrData=g; punchData=pd;
  const p=new URLSearchParams(window.location.search);
  const d=p.get("date");
  if(d){document.getElementById("dayPicker").value=d;loadDay();}
}).catch(()=>{document.getElementById("content").innerHTML='<div class="no-date-hint">⚠ Could not load JSON files.</div>';});

function formatDateLong(d){if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function formatDate(d){if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});}

/* ── Cross-mode times for a given employee on a given date ── */
/* ── Cross-mode times for a given employee on a given date ── */
function getCrossModeTimes(name, date, mode) {
  const allForDay = punchData.filter(p => p.Name === name && (p.Date||"").slice(0,10) === date);
  const modePunches = mode==="all" ? allForDay.length : allForDay.filter(p => p.Mode === mode).length;
  const totalPunches = allForDay.length;

  // Official attendance: Face + Great HR only
  const officialTimes = allForDay
    .filter(p => p.Mode === "face" || p.Mode === "greathr")
    .map(p => p.Time).sort();

  if (officialTimes.length === 0) {
    return { firstIn: "—", lastOut: "—", hours: "—", totalPunches, modePunches };
  }
  if (officialTimes.length === 1) {
    return { firstIn: officialTimes[0].slice(0,5), lastOut: "—", hours: "—", totalPunches, modePunches };
  }

  const firstIn = officialTimes[0].slice(0,5);
  const lastOut = officialTimes[officialTimes.length-1].slice(0,5);
  const [fh,fm] = firstIn.split(":").map(Number);
  const [lh,lm] = lastOut.split(":").map(Number);
  const hours   = Math.round(((lh*60+lm)-(fh*60+fm))/60*100)/100;

  return { firstIn, lastOut, hours, totalPunches, modePunches };
}
function getLoginStatus(timeStr) {
  if (!timeStr || timeStr === "—") return null;
  const [h, m] = timeStr.split(":").map(Number);
  const mins = h * 60 + m;
  if (mins < 9 * 60 + 30)  return { color: "var(--green)", tooltip: "Early Login" };
  if (mins <= 9 * 60 + 45) return { color: "#4a9eff",      tooltip: "On Time" };
  return                           { color: "var(--amber)", tooltip: "Late Login" };
}
function getExpectedHours(dateStr) {
  if (!dateStr) return 8;
  const day = new Date(dateStr + "T00:00:00").getDay();
  return day === 6 ? 4 : 8;
}

function statusBadgeForDate(hoursNum, dateStr) {
  const full = getExpectedHours(dateStr);
  const half = full / 2;
  if (hoursNum >= full) return ["badge-full", "Full day"];
  if (hoursNum >= half) return ["badge-half", "Half day"];
  return ["badge-short", "Short"];
}

function loadDay(){
  const date=document.getElementById("dayPicker").value;
  if(!date)return;
  document.getElementById("selectedLabel").textContent=formatDateLong(date);

  const faceDay=faceData.filter(r=>(r.Date||"").slice(0,10)===date);
  const fpDay  =fpData.filter(r=>(r.Date||"").slice(0,10)===date);
  const ghrDay =ghrData.filter(r=>(r.Date||"").slice(0,10)===date);
  const allDay =[...faceDay,...fpDay,...ghrDay];
  const totalPresent=new Set(allDay.map(r=>r.Name)).size;

  // All tab: unique employees across all sources
  const allNames = new Set(allDay.map(r=>r.Name));

  document.getElementById("content").innerHTML=`
    <div class="summary-cards">
      <div class="s-card" style="--c:var(--accent)"><div class="sc-label">Total Present</div><div class="sc-val">${totalPresent}</div><div class="sc-sub">employees</div></div>
      <div class="s-card" style="--c:#a89fff"><div class="sc-label">Face</div><div class="sc-val">${new Set(faceDay.map(r=>r.Name)).size}</div><div class="sc-sub">employees</div></div>
      <div class="s-card" style="--c:var(--green)"><div class="sc-label">Fingerprint</div><div class="sc-val">${new Set(fpDay.map(r=>r.Name)).size}</div><div class="sc-sub">employees</div></div>
      <div class="s-card" style="--c:var(--purple)"><div class="sc-label">Great HR</div><div class="sc-val">${new Set(ghrDay.map(r=>r.Name)).size}</div><div class="sc-sub">employees</div></div>
    </div>
    <hr class="section-divider">
    <div class="tabs-section">
      <h2>Attendance Records</h2>
      <div class="tabs">
        <div class="tab active-all"   id="dtab-all"         onclick="switchTab('all')">🔀 All (${allNames.size})</div>
        <div class="tab"              id="dtab-face"        onclick="switchTab('face')">👤 Face (${faceDay.length})</div>
        <div class="tab"              id="dtab-fingerprint" onclick="switchTab('fingerprint')">🖐 Fingerprint (${fpDay.length})</div>
        <div class="tab"              id="dtab-greathr"     onclick="switchTab('greathr')">📱 Great HR (${ghrDay.length})</div>
      </div>
    </div>
    <div class="day-controls">
      <input type="text" id="day-search" placeholder="🔍 Name or Employee ID…" oninput="renderDayTable()">
      <span class="day-count" id="day-count">—</span>
      <button class="btn-back" onclick="exportDayExcel()" style="margin-left:8px">⬇ Excel</button>
      <button class="btn-back" onclick="exportDayCSV()">⬇ CSV</button>
      <button class="btn-back" onclick="printDayView()">🖨 Print</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Emp ID</th><th>Employee</th><th>First In</th><th>Last Out</th><th>Hours</th><th>Punches</th><th>Status</th></tr></thead>
        <tbody id="day-tbody"></tbody>
      </table>
      <div class="tfoot-row" id="day-foot">—</div>
    </div>`;

  currentTab="all";
  renderDayTable();
}

function switchTab(tab){
  currentTab=tab;
  ["all","face","fingerprint","greathr"].forEach(m=>{
    const t=document.getElementById("dtab-"+m);
    if(t)t.className="tab"+(m===tab?" active-"+m:"");
  });
  renderDayTable();
}

function renderDayTable(){
  const date=document.getElementById("dayPicker").value;
  if(!date)return;
  const q=(document.getElementById("day-search")?.value||"").toLowerCase().trim();

  let rows;
  if(currentTab==="all"){
    // One row per unique employee seen on this date across all sources
    const nameMap={};
    [...faceData,...fpData,...ghrData].forEach(r=>{
      if((r.Date||"").slice(0,10)!==date)return;
      const name=r.Name||"";
      if(!nameMap[name])nameMap[name]={Name:name, uid:r["User ID"]||r["Employee No"]||""};
    });
    rows=Object.values(nameMap);
  } else {
    const src=currentTab==="face"?faceData:currentTab==="fingerprint"?fpData:ghrData;
    rows=src.filter(r=>(r.Date||"").slice(0,10)===date);
  }

  if(q) rows=rows.filter(r=>{
    const uid=(r["User ID"]||r["Employee No"]||r.uid||"").toString().toLowerCase().trim();
    return (r.Name||"").toLowerCase().includes(q)||uid.includes(q);
  });

  if(currentTab!=="all") rows.sort((a,b)=>(a.First_In||"").localeCompare(b.First_In||""));
  else rows.sort((a,b)=>(a.Name||"").localeCompare(b.Name||""));

  const modeNames={all:"All Sources",face:"Face",fingerprint:"Fingerprint",greathr:"Great HR"};
  const tbody=document.getElementById("day-tbody");
  const foot =document.getElementById("day-foot");
  const cnt  =document.getElementById("day-count");
  if(!tbody)return;

  cnt.textContent=`${rows.length}`;
  foot.textContent=`${rows.length} employee${rows.length!==1?"s":""} — ${modeNames[currentTab]} · click a row for punch details`;

  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="8"><div class="no-data">No ${modeNames[currentTab]} records${q?" matching your search":""} for this date</div></td></tr>`;
    return;
  }

  tbody.innerHTML=rows.map((r,i)=>{
    const uid=r["User ID"]||r["Employee No"]||r.uid||"";
    const times=getCrossModeTimes(r.Name, date, currentTab==="all"?"all":currentTab);
    const h=times.hours;
    const hoursNum=(h==="—"||h===undefined)?0:Number(h);
    const [cls,label]=statusBadgeForDate(hoursNum, date);
    const pnchHtml=`<span class="pnch-mode">${times.modePunches}</span><span class="pnch-sep">/</span><span class="pnch-total">${times.totalPunches}</span>`;
    const ls=getLoginStatus(times.firstIn);
    const firstInHtml=ls
      ?`<span style="color:${ls.color};font-weight:600;cursor:default" title="${ls.tooltip}">${times.firstIn}</span>`
      :`<span style="color:var(--muted)">—</span>`;
    return`<tr onclick="openPanel('${(r.Name||"").replace(/'/g,"\\'")}','${date}','${uid.toString().replace(/'/g,"\\'")}')">
      <td>${i+1}</td>
      <td class="emp-id-col">${uid||"—"}</td>
      <td><div class="emp">${r.Name||"—"}</div></td>
      <td>${firstInHtml}</td>
      <td class="t-out">${times.lastOut}</td>
      <td style="font-weight:600">${h==="—"?"—":h+"h"}</td>
      <td class="pnch">${pnchHtml}</td>
      <td><span class="badge ${cls}">${label}</span></td>
    </tr>`;
  }).join("");
}

function openPanel(name, date, uid){
  panelContext={name, date, uid};

  const allForDay = punchData.filter(p => p.Name===name && (p.Date||"").slice(0,10)===date);
  const totalPunches = allForDay.length;

  const officialTimes = allForDay
    .filter(p => p.Mode === "face" || p.Mode === "greathr")
    .map(p => p.Time).sort();

  const firstIn = officialTimes.length >= 1 ? officialTimes[0].slice(0,5) : "—";
  const lastOut = officialTimes.length >= 2 ? officialTimes[officialTimes.length-1].slice(0,5) : "—";

  document.getElementById("panel-name").textContent=name;
  document.getElementById("panel-id").textContent=uid?"Employee ID: #"+uid:"";
  document.getElementById("pe-name").textContent=name;
  document.getElementById("pe-id").textContent=uid?"#"+uid:"No ID on record";
  document.getElementById("panel-day-label").textContent="📅 "+formatDateLong(date);

  const modes=[];
  if(faceData.some(r=>r.Name===name&&(r.Date||"").slice(0,10)===date))  modes.push(`<span class="mode-pill mode-face">👤 Face</span>`);
  if(fpData.some(r=>r.Name===name&&(r.Date||"").slice(0,10)===date))    modes.push(`<span class="mode-pill mode-fp">🖐 Fingerprint</span>`);
  if(ghrData.some(r=>r.Name===name&&(r.Date||"").slice(0,10)===date))   modes.push(`<span class="mode-pill mode-ghr">📱 Great HR</span>`);
  document.getElementById("pe-modes").innerHTML=modes.join("");

  document.getElementById("ps-firstin").textContent=firstIn;
  document.getElementById("ps-lastout").textContent=lastOut;
  document.getElementById("ps-punches").textContent=totalPunches;

  renderPunchTable();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("panel").classList.add("open");
}

function renderPunchTable(){
  if(!panelContext)return;
  const {name, date}=panelContext;

  let rows=punchData.filter(p=>{
    if(p.Name!==name)return false;
    if((p.Date||"").slice(0,10)!==date)return false;
    return true;
  });
  rows.sort((a,b)=>a.Time.localeCompare(b.Time));

  document.getElementById("punch-foot").textContent=`${rows.length} punch event${rows.length!==1?"s":""} on this day`;
  const tbody=document.getElementById("punch-tbody");

  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--muted)">No punch events found for this date</td></tr>`;
    return;
  }

  const total=rows.length;
  tbody.innerHTML=rows.map((p,j)=>{
    const isIn =j===0;
    const isOut=j===total-1&&total>1;
    const label=isIn?"🟢 In":isOut?"🔴 Out":`⚪ #${j+1}`;
    const tc   =isIn?"punch-in":isOut?"punch-out":"";
    const mp   =p.Mode==="face"
      ?`<span class="mode-pill mode-face">👤 Face</span>`
      :p.Mode==="fingerprint"
      ?`<span class="mode-pill mode-fp">🖐 FP</span>`
      :`<span class="mode-pill mode-ghr">📱 GHR</span>`;
    return`<tr>
      <td style="color:var(--muted);font-size:12px;text-align:center">${j+1}</td>
      <td class="${tc}" style="font-size:16px;font-weight:700;letter-spacing:.03em">${p.Time}</td>
      <td style="font-size:13px">${label}</td>
      <td>${mp}</td>
      <td style="font-size:13px;color:var(--muted)">${p.Device||"—"}</td>
    </tr>`;
  }).join("");
}
function getDayExportRows() {
  const date = document.getElementById("dayPicker").value;
  if (!date) return { headers:[], dataRows:[] };

  let rows;
  if(currentTab==="all"){
    const nameMap={};
    [...faceData,...fpData,...ghrData].forEach(r=>{
      if((r.Date||"").slice(0,10)!==date)return;
      const name=r.Name||"";
      if(!nameMap[name])nameMap[name]={Name:name,uid:r["User ID"]||r["Employee No"]||""};
    });
    rows=Object.values(nameMap);
  } else {
    const src=currentTab==="face"?faceData:currentTab==="fingerprint"?fpData:ghrData;
    rows=src.filter(r=>(r.Date||"").slice(0,10)===date);
  }

  const q=(document.getElementById("day-search")?.value||"").toLowerCase().trim();
  if(q) rows=rows.filter(r=>{
    const uid=(r["User ID"]||r["Employee No"]||r.uid||"").toString().toLowerCase();
    return (r.Name||"").toLowerCase().includes(q)||uid.includes(q);
  });

  const headers=["Emp ID","Name","Date","First In","Last Out","Hours","Total Punches","Status"];
  const dataRows=rows.map(r=>{
    const uid=r["User ID"]||r["Employee No"]||r.uid||"";
    const times=getCrossModeTimes(r.Name, date, currentTab==="all"?"all":currentTab);
    const h=times.hours;
    const hoursNum=(h==="—"||h===undefined)?0:Number(h);
    const full=getExpectedHours(date);
    const half=full/2;
    const status=hoursNum>=full?"Full day":hoursNum>=half?"Half day":"Short";
    return[uid,r.Name||"",date,times.firstIn,times.lastOut,h==="—"?"":h,times.totalPunches,h==="—"?"—":status];
  });
  return {headers, dataRows};
}

function exportDayExcel() {
  const {headers,dataRows}=getDayExportRows();
  if(!dataRows.length)return;
  const date=document.getElementById("dayPicker").value;
  const escape=s=>String(s??'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const allRows=[headers,...dataRows];
  const table=`<table>${allRows.map((r,i)=>`<tr>${r.map(c=>`<${i===0?"th":"td"}>${escape(c)}</${i===0?"th":"td"}>`).join("")}</tr>`).join("")}</table>`;
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body>${table}</body></html>`;
  const blob=new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`attendance_${date}_${currentTab}.xls`;
  a.click();
}

function exportDayCSV() {
  const {headers,dataRows}=getDayExportRows();
  if(!dataRows.length)return;
  const date=document.getElementById("dayPicker").value;
  const csvRows=[headers.join(","),...dataRows.map(cols=>cols.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(","))];
  const blob=new Blob([csvRows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`attendance_${date}_${currentTab}.csv`;
  a.click();
}

function printDayView() {
  window.print();
}

function closePanel(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePanel();});
</script>
